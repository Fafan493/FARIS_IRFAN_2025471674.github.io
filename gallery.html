<!DOCTYPE html>
<html>

    <head>
        <title>Gallery</title>

        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

        <style>
        
        body, h1 {
        font-family: "Poppins", sans-serif;
        color: white;
        }

        body {
            background-image: linear-gradient(
            rgba(0,0,0,0.55),
            rgba(0,0,0,0.55)
            ), url('bg2.jpg');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            margin: 0;
            padding: 0;
         }

         footer {
            text-align: center;
            padding: 20px;
            background-color: rgba(0,0,0,0.8);
            color: white;
            margin-top: 50px;
        }

        .gallery{
            display:grid;
            grid-template-columns:
            repeat(auto-fit, minmax(250px,1fr));
            gap:20px;
            padding:20px;
        }

        .gallery img{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:15px;
            transition:0.3s;
            border: 2px solid rgba(138,207,240,.6)
        }

        .gallery img:hover{

            transform:translateY(-8px);
            box-shadow:0 0 20px rgba(138,207,240,.7);
        }

        </style>
    </head>
    <body>
